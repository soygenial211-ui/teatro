<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Votos de Silencio - Grid Móvil</title>
    <style>
        :root {
            --bg-ui: #f4f1ea;
            --card-border: #8d7d66;
            --accent-red: #b22222;
            --text-main: #2c2c2c;
            --accent-gold: #d4af37;
        }

        body {
            background-color: #dcd7c9;
            color: var(--text-main);
            font-family: serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 10px; }
        h1 { color: var(--accent-red); margin: 0; font-size: 1.5rem; }

        /* Grid de 3, 2, 2 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* Sistema de 6 columnas para manejar 3 y 2 */
            gap: 10px;
            width: 100%;
            max-width: 900px;
        }

        /* Configuración de las filas para 3, 2 y 2 */
        .char-card { grid-column: span 2; } /* Fila 1: 3 cartas (2+2+2 = 6) */
        .row-2 { grid-column: span 3; }    /* Fila 2: 2 cartas (3+3 = 6) */
        .row-3 { grid-column: span 3; }    /* Fila 3: 2 cartas (3+3 = 6) */

        .char-card {
            background: var(--bg-ui);
            border: 2px solid var(--card-border);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .char-info { text-align: center; margin-bottom: 8px; }
        .char-info strong { color: var(--accent-red); display: block; font-size: 0.9rem; }
        .char-info span { font-size: 0.7rem; font-style: italic; color: #666; }

        /* Selector de Pecados */
        .selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
            padding: 4px;
        }

        .arrow {
            font-size: 1.5rem;
            color: var(--accent-red);
            cursor: pointer;
            padding: 0 10px;
            user-select: none;
        }

        .sin-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        .sin-icon { font-size: 1.2rem; }
        .sin-name { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: #555; }

        .btn-check {
            margin-top: 20px;
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 400px;
        }

        #message { margin: 10px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>VOTOS DE SILENCIO</h1>
    </div>

    <div class="game-grid" id="mainGrid">
        <!-- Generado por JS -->
    </div>

    <div id="message"></div>
    <button class="btn-check" onclick="checkSolution()">VERIFICAR RESPUESTA</button>

<script>
    const PECADOS = [
        { id: "gula", nombre: "Gula", icono: "🍎" },
        { id: "avaricia", nombre: "Avaricia", icono: "💰" },
        { id: "soberbia", nombre: "Soberbia", icono: "💎" },
        { id: "pereza", nombre: "Pereza", icono: "☁️" },
        { id: "envidia", nombre: "Envidia", icono: "🐍" },
        { id: "lujuria", nombre: "Lujuria", icono: "💋" },
        { id: "ira", nombre: "Ira", icono: "🗡️" }
    ];

    const PERSONAJES = [
        { id: 0, nombre: "El Cocinero", detalle: "Saboreó la traición.", meta: "gula" },
        { id: 1, nombre: "El Padrino", detalle: "Manos ajenas.", meta: "avaricia" },
        { id: 2, nombre: "La Madre", detalle: "Espejo roto.", meta: "soberbia" },
        { id: 3, nombre: "El Anciano", detalle: "Testigo inmóvil.", meta: "pereza" },
        { id: 4, nombre: "El Chofer", detalle: "Deseo al volante.", meta: "envidia" },
        { id: 5, nombre: "El Novio", detalle: "Aroma prohibido.", meta: "lujuria" },
        { id: 6, nombre: "La Novia", detalle: "Sangre y fuego.", meta: "ira" }
    ];

    // Estado actual: cada personaje empieza con un pecado aleatorio o el primero
    let estado = PERSONAJES.map(() => 0); 

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';

        PERSONAJES.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'char-card';
            
            // Aplicar clases de fila para el grid 3, 2, 2
            if (index >= 3 && index <= 4) card.classList.add('row-2');
            if (index >= 5) card.classList.add('row-3');

            const pecadoActual = PECADOS[estado[index]];

            card.innerHTML = `
                <div class="char-info">
                    <strong>${p.nombre}</strong>
                    <span>${p.detalle}</span>
                </div>
                <div class="selector">
                    <div class="arrow" onclick="changeSin(${index}, -1)">&#9664;</div>
                    <div class="sin-display">
                        <span class="sin-icon">${pecadoActual.icono}</span>
                        <span class="sin-name">${pecadoActual.nombre}</span>
                    </div>
                    <div class="arrow" onclick="changeSin(${index}, 1)">&#9654;</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function changeSin(charIndex, dir) {
        estado[charIndex] = (estado[charIndex] + dir + PECADOS.length) % PECADOS.length;
        render();
    }

    function checkSolution() {
        let aciertos = 0;
        PERSONAJES.forEach((p, i) => {
            if (PECADOS[estado[i]].id === p.meta) aciertos++;
        });

        const msg = document.getElementById('message');
        if (aciertos === 7) {
            msg.style.color = "green";
            msg.innerText = "¡TODOS HAN CONFESADO!";
            finalizarPuzzle();
        } else {
            msg.style.color = "var(--accent-red)";
            msg.innerText = `Aciertos: ${aciertos} / 7`;
        }
    }

    function finalizarPuzzle() {
        const padre = window.parent;
        if (padre && padre.interaccionActual) {
            padre.completarAccion(padre.interaccionActual.data, padre.interaccionActual.lugar, false);
            setTimeout(() => padre.cerrarPuzzle(), 1500);
        }
    }

    render();
</script>
</body>
</html>
