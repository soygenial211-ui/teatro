<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laboratorio Químico - Secuencia Crítica</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #151515;
            --accent: #00fbff;
            --danger: #ff003c;
        }

        body {
            background-color: var(--bg);
            color: #eee;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: space-evenly; /* Distribución horizontal */
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #ui-status {
            text-align: center;
            padding: 10px;
            border: 2px solid #333;
            background: var(--panel);
            position: absolute; 
            top: 10px; 
            width: 80%;
            z-index: 100;
        }

        /* --- LADO IZQUIERDO: SELECTOR --- */
        .selector-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 30%;
        }

        .test-tube-area {
            width: 60px;
            height: 140px;
            border: 3px solid #777;
            border-radius: 0 0 30px 30px;
            position: relative;
            background: rgba(255,255,255,0.05);
        }

        .test-tube-liquid {
            position: absolute;
            bottom: 8px;
            left: 10%;
            width: 80%;
            height: 70%;
            border-radius: 0 0 25px 25px;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .arrow {
            font-size: 2.5rem;
            color: var(--accent);
            cursor: pointer;
            user-select: none;
            padding: 5px 15px;
            background: rgba(0,251,255,0.1);
            border-radius: 10px;
        }

        .compound-name {
            font-size: 0.9rem;
            text-align: center;
            min-height: 2.5em;
            font-weight: bold;
        }

        /* --- CENTRO: BOTÓN AGREGAR --- */
        .action-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 20%;
        }

        #btn-add {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 15px 20px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,251,255,0.2);
            transition: all 0.2s;
        }

        #btn-add:active {
            transform: scale(0.9);
            background: var(--accent);
            color: #000;
        }

        /* --- LADO DERECHO: MATRAZ --- */
        .drop-zone {
            width: 30%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .flask {
            width: 140px;
            height: 180px;
            background: rgba(255,255,255,0.03);
            border: 4px solid #555;
            border-radius: 12px 12px 60px 60px;
            position: relative;
            overflow: hidden;
        }

        #liquid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            transition: height 0.7s ease-out, background 0.5s ease;
        }

        /* Animaciones */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .pour { animation: pour 0.5s ease; }
        @keyframes pour {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) translateY(-10px); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="ui-status">
        <div id="msg" style="color: var(--accent);">COMBINA LA SECUENCIA</div>
        <div id="counter">MUESTRAS: 0 / 3</div>
    </div>

    <!-- IZQUIERDA: SELECTOR -->
    <div class="selector-container">
        <div class="compound-name" id="compoundName">CARGANDO...</div>
        <div class="test-tube-area" id="sourceTube">
            <div class="test-tube-liquid" id="sourceLiquid"></div>
        </div>
        <div class="nav-controls">
            <div class="arrow" onclick="changeCompound(-1)">&#9664;</div>
            <div class="arrow" onclick="changeCompound(1)">&#9654;</div>
        </div>
    </div>

    <!-- CENTRO: BOTÓN -->
    <div class="action-container">
        <button id="btn-add" onclick="ejecutarAdicion()">AGREGAR</button>
    </div>

    <!-- DERECHA: MATRAZ -->
    <div class="drop-zone">
        <div class="flask" id="mainFlask">
            <div id="liquid"></div>
        </div>
    </div>

<script>
    const SUSTANCIAS = [
        { id: 1, nombre: "ISOPROPANOL", color: "#ff0044" },
        { id: 2, nombre: "HIDRURO DE LITIO", color: "#00ff44" },
        { id: 3, nombre: "OXIDO DE MAGNESIO", color: "#0066ff" },
        { id: 4, nombre: "GLICERINA", color: "#ffee00" },
        { id: 5, nombre: "NITROMETANO", color: "#cc00ff" },
        { id: 6, nombre: "CARBONATO", color: "#00ffff" },
        { id: 7, nombre: "SULFATO DE SODIO", color: "#ff8800" }
    ];

    const SOLUCION = [2, 5, 7]; 
    let seleccionadas = [];
    let currentIndex = 0;
    let bloqueado = false;

    function updateSelector() {
        const s = SUSTANCIAS[currentIndex];
        document.getElementById('compoundName').textContent = s.nombre;
        const liq = document.getElementById('sourceLiquid');
        liq.style.backgroundColor = s.color;
        liq.style.boxShadow = `0 0 15px ${s.color}aa`;
    }

    function changeCompound(dir) {
        if(bloqueado) return;
        currentIndex = (currentIndex + dir + SUSTANCIAS.length) % SUSTANCIAS.length;
        updateSelector();
    }

    function ejecutarAdicion() {
        if (bloqueado || seleccionadas.length >= 3) return;
        
        // Animación de "vertido" en el tubo
        const tube = document.getElementById('sourceTube');
        tube.classList.add('pour');
        setTimeout(() => tube.classList.remove('pour'), 500);

        añadirSustancia(SUSTANCIAS[currentIndex]);
    }

    function añadirSustancia(sustancia) {
        // Evitar agregar la misma dos veces seguidas si se desea
        if (seleccionadas.length > 0 && seleccionadas[seleccionadas.length-1].id === sustancia.id) {
            document.getElementById('msg').textContent = "YA AGREGADO";
            setTimeout(() => document.getElementById('msg').textContent = "COMBINA LA SECUENCIA", 1000);
            return;
        }
        
        seleccionadas.push(sustancia);
        actualizarVisual();
        if (seleccionadas.length === 3) verificarMezcla();
    }

    function actualizarVisual() {
        const liquid = document.getElementById('liquid');
        const cantidad = seleccionadas.length;
        liquid.style.height = (cantidad * 33.3) + "%";
        if (cantidad > 0) {
            document.getElementById('counter').textContent = `MUESTRAS: ${cantidad} / 3`;
            liquid.style.backgroundColor = seleccionadas[cantidad - 1].color;
        }
    }

    function verificarMezcla() {
        bloqueado = true;
        const esCorrecto = seleccionadas.every((s, i) => s.id === SOLUCION[i]);

        setTimeout(() => {
            if (esCorrecto) {
                document.getElementById('msg').textContent = "SECUENCIA CORRECTA";
                if (window.parent && window.parent.completarAccion) {
                    window.parent.completarAccion(window.parent.interaccionActual.data, window.parent.interaccionActual.lugar, false);
                    setTimeout(() => window.parent.cerrarPuzzle(), 1500);
                }
            } else {
                document.getElementById('msg').textContent = "ERROR EN LA MEZCLA";
                document.getElementById('mainFlask').classList.add('shake');
                setTimeout(reiniciar, 1000);
            }
        }, 600);
    }

    function reiniciar() {
        seleccionadas = [];
        bloqueado = false;
        document.getElementById('liquid').style.height = "0%";
        document.getElementById('mainFlask').classList.remove('shake');
        document.getElementById('msg').textContent = "COMBINA LA SECUENCIA";
        document.getElementById('counter').textContent = "MUESTRAS: 0 / 3";
    }

    updateSelector();
</script>
</body>
</html>
