<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laboratorio Químico - Secuencia Crítica</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #151515;
            --accent: #00fbff;
            --danger: #ff003c;
        }

        body {
            background-color: var(--bg);
            color: #eee;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #ui-status {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            border: 2px solid #333;
            width: 85%;
            max-width: 500px;
            background: var(--panel);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #msg { font-size: 1.2rem; margin-bottom: 5px; }
        #counter { font-size: 1rem; letter-spacing: 2px; opacity: 0.8; }

        /* Área del Matraz - MÁS GRANDE */
        .drop-zone {
            width: 200px;
            height: 240px;
            margin: 10px auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .flask {
            width: 180px;
            height: 220px;
            background: rgba(255,255,255,0.03);
            border: 5px solid #555;
            border-radius: 15px 15px 80px 80px;
            position: relative;
            overflow: hidden;
            z-index: 2;
            box-shadow: inset 0 0 30px rgba(255,255,255,0.05);
        }

        #liquid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: transparent;
            transition: height 0.7s ease-out, background 0.5s ease;
        }

        /* Estante y Botellas - MÁS GRANDES */
        .shelf {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 30px;
            background: #1a1a1a;
            border-bottom: 12px solid #000;
            border-radius: 15px;
            max-width: 95vw;
            margin-top: 20px;
        }

        .substance {
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none;
            cursor: grab;
            z-index: 10;
        }

        .bottle {
            width: 60px; /* Aumentado */
            height: 90px; /* Aumentado */
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px 8px 4px 4px;
            margin-bottom: 10px;
            position: relative;
            transition: transform 0.2s;
        }

        .bottle::after {
            content: '';
            position: absolute;
            top: -12px; left: 18px;
            width: 24px; height: 12px;
            background: #444;
            border-radius: 3px;
        }

        .label { 
            font-size: 11px; 
            font-weight: bold; 
            text-align: center; 
            color: #ccc; 
            text-transform: uppercase;
            max-width: 80px;
        }

        /* Feedback Visual */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-15px); }
            40%, 80% { transform: translateX(15px); }
        }

        .dragging { 
            opacity: 0.8; 
            transform: scale(1.2); 
            pointer-events: none; 
            position: fixed; 
            z-index: 999;
        }

        @media (max-width: 500px) {
            .shelf { grid-template-columns: repeat(3, 1fr); gap: 15px; }
            .bottle { width: 50px; height: 75px; }
        }
    </style>
</head>
<body>

    <div id="ui-status">
        <div id="msg" style="color: var(--accent);">SIGUE LA SECUENCIA QUÍMICA</div>
        <div id="counter">MUESTRAS: 0 / 3</div>
    </div>

    <div class="drop-zone" id="dropTarget">
        <div class="flask" id="mainFlask">
            <div id="liquid"></div>
        </div>
    </div>

    <div class="shelf" id="shelf"></div>

<script>
    const SUSTANCIAS = [
        { id: 1, nombre: "ISOPROPANOL", color: "#ff0044" },
        { id: 2, nombre: "HIDRURO DE LITIO", color: "#00ff44" },
        { id: 3, nombre: "OXIDO DE MAGNESIO", color: "#0066ff" },
        { id: 4, nombre: "GLICERINA", color: "#ffee00" },
        { id: 5, nombre: "NITROMETANO", color: "#cc00ff" },
        { id: 6, nombre: "CARBONATO", color: "#00ffff" },
        { id: 7, nombre: "SULFATO DE SODIO", color: "#ff8800" }
    ];

    // SOLUCIÓN CON ORDEN ESTRICTO: Vulcanita (1) -> Cobalto (3) -> Plasma (5)
    const SOLUCION = [2, 5, 7]; 
    let seleccionadas = [];
    let bloqueado = false;

    const shelf = document.getElementById('shelf');
    SUSTANCIAS.forEach(s => {
        const div = document.createElement('div');
        div.className = 'substance';
        div.innerHTML = `
            <div class="bottle" style="background: ${s.color}; box-shadow: 0 0 20px ${s.color}88;"></div>
            <div class="label">${s.nombre}</div>
        `;
        shelf.appendChild(div);
        
        div.addEventListener('mousedown', (e) => startDrag(e, s, div));
        div.addEventListener('touchstart', (e) => startDrag(e, s, div), {passive: false});
    });

    let activeDrag = null;

    function startDrag(e, sustancia, originalEl) {
        if (bloqueado || seleccionadas.length >= 3) return;
        // Permite repetir la misma sustancia si el diseño lo requiere, 
        // pero aquí mantenemos que no se repitan para evitar errores de usuario.
        if (seleccionadas.find(item => item.id === sustancia.id)) return;

        e.preventDefault();
        const touch = e.touches ? e.touches[0] : e;
        
        activeDrag = originalEl.cloneNode(true);
        activeDrag.classList.add('dragging');
        activeDrag.style.left = `${touch.clientX - 30}px`;
        activeDrag.style.top = `${touch.clientY - 45}px`;
        document.body.appendChild(activeDrag);

        const moveHandler = (moveEvent) => {
            const mTouch = moveEvent.touches ? moveEvent.touches[0] : moveEvent;
            activeDrag.style.left = `${mTouch.clientX - 30}px`;
            activeDrag.style.top = `${mTouch.clientY - 45}px`;
        };

        const endHandler = (endEvent) => {
            const eTouch = endEvent.changedTouches ? endEvent.changedTouches[0] : endEvent;
            checkDrop(eTouch.clientX, eTouch.clientY, sustancia);
            
            document.removeEventListener('mousemove', moveHandler);
            document.removeEventListener('mouseup', endHandler);
            document.removeEventListener('touchmove', moveHandler);
            document.removeEventListener('touchend', endHandler);
            if (activeDrag) activeDrag.remove();
            activeDrag = null;
        };

        document.addEventListener('mousemove', moveHandler);
        document.addEventListener('mouseup', endHandler);
        document.addEventListener('touchmove', moveHandler, {passive: false});
        document.addEventListener('touchend', endHandler);
    }

    function checkDrop(x, y, sustancia) {
        const target = document.getElementById('dropTarget').getBoundingClientRect();
        if (x >= target.left && x <= target.right && y >= target.top && y <= target.bottom) {
            añadirSustancia(sustancia);
        }
    }

    function añadirSustancia(sustancia) {
        seleccionadas.push(sustancia);
        actualizarVisual();

        if (seleccionadas.length === 3) {
            verificarMezcla();
        }
    }

    function actualizarVisual() {
        const liquid = document.getElementById('liquid');
        const cantidad = seleccionadas.length;
        liquid.style.height = (cantidad * 33.3) + "%";
        
        if (cantidad > 0) {
            document.getElementById('counter').textContent = `MUESTRAS: ${cantidad} / 3`;
            const colorActual = seleccionadas[seleccionadas.length - 1].color;
            liquid.style.backgroundColor = colorActual;
            liquid.style.boxShadow = `0 -15px 30px ${colorActual}`;
        }
    }

    function verificarMezcla() {
        bloqueado = true;
        
        // COMPROBACIÓN DE ORDEN ESTRICTO
        const esCorrecto = seleccionadas.every((s, index) => s.id === SOLUCION[index]);

        setTimeout(() => {
            // Dentro de Quimica.html, al detectar la victoria:
if (esCorrecto) {
    document.getElementById('msg').textContent = "SECUENCIA CORRECTA";
    const padre = window.parent;
    if (padre && padre.interaccionActual) {
        padre.completarAccion(padre.interaccionActual.data, padre.interaccionActual.lugar, false);
        setTimeout(() => {
            padre.cerrarPuzzle();
        }, 1500);
    }
} else {
                document.getElementById('msg').textContent = "ESTO NO SIRVE PARA NADA";
                document.getElementById('msg').style.color = "var(--danger)";
                document.getElementById('mainFlask').classList.add('shake');
                setTimeout(reiniciar, 1000);
            }
        }, 600);
    }

    function reiniciar() {
        seleccionadas = [];
        bloqueado = false;
        document.getElementById('liquid').style.height = "0%";
        document.getElementById('mainFlask').classList.remove('shake');
        document.getElementById('msg').textContent = "SIGUE LA SECUENCIA QUÍMICA";
        document.getElementById('msg').style.color = "var(--accent)";
        document.getElementById('counter').textContent = "MUESTRAS: 0 / 3";
    }
</script>
</body>
</html>
